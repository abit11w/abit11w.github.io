<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>E-Ink Hub: Decider & Spiele</title>
<style>
  /* Gemeinsames E-Ink Optimiertes Design */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    font-family: Georgia, 'Times New Roman', serif; 
    background: #fff; 
    color: #000; 
    min-height: 100vh;
    line-height: 1.4;
  }

  /* Tab-Navigation */
  nav {
    display: flex;
    border-bottom: 3px solid #000;
    background: #fff;
    position: sticky;
    top: 0;
    z-index: 1000;
  }
  .tab-btn {
    flex: 1;
    padding: 15px 5px;
    font-family: Georgia, serif;
    font-size: 14px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
    background: #fff;
    border: none;
    border-right: 1px solid #000;
    cursor: pointer;
  }
  .tab-btn:last-child { border-right: none; }
  .tab-btn.active { background: #000; color: #fff; }

  /* Container */
  .content-section { display: none; padding: 20px; max-width: 500px; margin: 0 auto; }
  .content-section.active { display: block; }

  /* UI Elemente (E-Ink Stil) */
  h1 { 
    font-size: 32px; 
    letter-spacing: 4px; 
    text-transform: uppercase; 
    border-bottom: 2px double #000; 
    margin-bottom: 20px; 
    text-align: center;
  }
  .btn-main {
    display: block;
    width: 100%;
    margin: 10px 0;
    padding: 18px;
    font-size: 16px;
    font-family: Georgia, serif;
    background: #fff;
    border: 2px solid #000;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .btn-main:active { background: #000; color: #fff; }
  
  .card-container {
    border: 1px solid #000;
    padding: 15px;
    margin-top: 20px;
    text-align: center;
  }

  .tagline { font-size: 12px; font-style: italic; color: #666; margin-bottom: 20px; text-align: center; }
</style>
</head>
<body>

<nav>
  <button class="tab-btn active" onclick="showTab('decider')">Decider</button>
  <button class="tab-btn" onclick="showTab('durak')">Durak</button>
  <button class="tab-btn" onclick="showTab('cosmos')">Cosmos</button>
</nav>

<section id="decider" class="content-section active">
  <h1>Decider</h1>
  <div class="tagline">Triff klare Entscheidungen</div>
  <button class="btn-main" onclick="alert('Münzwurf: ' + (Math.random() > 0.5 ? 'KOPF' : 'ZAHL'))">Münze werfen</button>
  <button class="btn-main" onclick="alert('Zufall sagt: ' + (Math.random() > 0.5 ? 'JA' : 'NEIN'))">Ja / Nein</button>
  <div class="card-container">
    <p><em>"Zukünftige Reue ist ein starkes Signal."</em></p>
  </div>
</section>

<section id="durak" class="content-section">
  <h1>Durak</h1>
  <div class="tagline">Подкидной · Kartenspiel</div>
  <button class="btn-main">Neues Spiel (KI)</button>
  <button class="btn-main">2 Spieler (P&P)</button>
  <div style="margin-top:20px; font-size:14px; text-align:center;">
    Trumpf-Symbolik: ♣ ♠ ♥ ♦
  </div>
</section>

<section id="cosmos" class="content-section">
  <h1>Cosmos</h1>
  <div class="tagline">Sammle das Universum</div>
  <button class="btn-main" style="background:#000; color:#fff;">✦ Ziehen</button>
  <button class="btn-main">Sammlung ansehen</button>
  <div class="card-container" style="font-family: monospace; white-space: pre;">
   * *
      *
  * *
  (ASCII ART)
  </div>
</section>

<script>
  function showTab(tabId) {
    // Alle Sektionen verstecken
    document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
    // Alle Buttons deaktivieren
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    
    // Ziel anzeigen
    document.getElementById(tabId).classList.add('active');
    event.currentTarget.classList.add('active');
  }
</script>

</body>
</html>
