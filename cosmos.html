<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>COSMOS — Sammle das Universum</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Georgia, serif; background: #fff; color: #000; min-height: 100vh; }

.screen { display: none; }
.screen.active { display: block; }

/* ---- MENU ---- */
#menu {
  max-width: 480px;
  margin: 0 auto;
  padding: 36px 20px;
  text-align: center;
}
#menu h1 {
  font-size: 52px;
  letter-spacing: 10px;
  margin-bottom: 4px;
}
#menu .sub {
  font-size: 11px;
  letter-spacing: 4px;
  color: #888;
  margin-bottom: 48px;
  text-transform: uppercase;
}
.big-btn {
  display: block;
  width: 100%;
  max-width: 320px;
  margin: 12px auto;
  padding: 20px;
  font-size: 17px;
  font-family: Georgia, serif;
  border: 2px solid #000;
  background: #fff;
  cursor: pointer;
  letter-spacing: 2px;
  text-transform: uppercase;
}
.big-btn.primary { background: #000; color: #fff; }
.big-btn:active { background: #000; color: #fff; }
.big-btn.primary:active { background: #fff; color: #000; }

#menu-stats {
  margin-top: 36px;
  font-size: 12px;
  color: #999;
  letter-spacing: 2px;
}

/* ---- HEADER ---- */
.page-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 14px;
  border-bottom: 2px solid #000;
  max-width: 480px;
  margin: 0 auto;
}
.page-header .title {
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #666;
}
.page-header button {
  font-size: 12px;
  padding: 6px 12px;
  border: 1px solid #000;
  background: #fff;
  font-family: Georgia, serif;
  cursor: pointer;
}
.page-header button:active { background: #000; color: #fff; }

/* ---- DRAW SCREEN ---- */
#draw-screen { min-height: 100vh; }
#draw-body {
  max-width: 480px;
  margin: 0 auto;
  padding: 20px 16px;
  text-align: center;
}

#draw-rarity-label {
  font-size: 10px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: #aaa;
  margin-bottom: 6px;
  min-height: 18px;
}

#draw-ascii {
  font-family: monospace;
  font-size: 16px;
  line-height: 1.5;
  display: inline-block;
  text-align: left;
  border: 2px solid #000;
  padding: 16px 20px;
  margin: 10px 0 14px;
  min-width: 220px;
  min-height: 120px;
  vertical-align: top;
  background: #fff;
}

#draw-name {
  font-size: 26px;
  font-weight: bold;
  letter-spacing: 3px;
  margin-bottom: 4px;
}
#draw-latin {
  font-size: 12px;
  color: #777;
  font-style: italic;
  letter-spacing: 1px;
  margin-bottom: 6px;
}
#draw-desc {
  font-size: 13px;
  color: #555;
  line-height: 1.6;
  max-width: 320px;
  margin: 0 auto 12px;
}
#draw-type-badge {
  display: inline-block;
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  border: 1px solid #000;
  padding: 3px 10px;
  margin-bottom: 16px;
}

#draw-new-badge {
  display: none;
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #fff;
  background: #000;
  padding: 4px 12px;
  margin: 0 auto 16px;
  display: none;
}

#draw-prob-bar {
  max-width: 280px;
  margin: 0 auto 20px;
}
#draw-prob-bar .bar-label {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: #999;
  margin-bottom: 3px;
  letter-spacing: 1px;
}
#draw-prob-track {
  height: 6px;
  border: 1px solid #ccc;
  background: #fff;
}
#draw-prob-fill {
  height: 100%;
  background: #000;
}

#draw-progress {
  font-size: 11px;
  color: #aaa;
  letter-spacing: 2px;
  margin-bottom: 20px;
}

#btn-draw {
  display: block;
  width: 240px;
  margin: 0 auto 10px;
  padding: 20px;
  font-size: 18px;
  font-family: Georgia, serif;
  border: 2px solid #000;
  background: #000;
  color: #fff;
  cursor: pointer;
  letter-spacing: 3px;
  text-transform: uppercase;
}
#btn-draw:active { background: #fff; color: #000; }

#draw-count-label {
  font-size: 11px;
  color: #bbb;
  letter-spacing: 2px;
}

/* ---- COLLECTION SCREEN ---- */
#coll-screen { min-height: 100vh; }
#coll-body {
  max-width: 480px;
  margin: 0 auto;
  padding: 12px 10px;
}

#coll-filter {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 14px;
}
.filter-btn {
  font-size: 11px;
  padding: 5px 10px;
  border: 1px solid #ccc;
  background: #fff;
  font-family: Georgia, serif;
  cursor: pointer;
  letter-spacing: 1px;
}
.filter-btn.active { background: #000; color: #fff; border-color: #000; }

#coll-progress-bar {
  margin-bottom: 14px;
}
#coll-progress-bar .bar-track {
  height: 8px;
  border: 1px solid #000;
  margin-bottom: 4px;
}
#coll-progress-bar .bar-fill { height: 100%; background: #000; }
#coll-progress-text {
  font-size: 11px;
  color: #888;
  letter-spacing: 2px;
}

#coll-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}

.coll-item {
  border: 1px solid #ddd;
  padding: 10px 8px;
  text-align: center;
}
.coll-item.owned { border-color: #000; border-width: 2px; }
.coll-item.locked { opacity: 0.3; }

.coll-item pre {
  font-family: monospace;
  font-size: 11px;
  line-height: 1.4;
  display: inline-block;
  text-align: left;
  margin-bottom: 6px;
}
.coll-item .item-name {
  font-size: 12px;
  font-weight: bold;
  letter-spacing: 1px;
  display: block;
  margin-bottom: 2px;
}
.coll-item .item-rarity {
  font-size: 10px;
  color: #aaa;
  letter-spacing: 2px;
  text-transform: uppercase;
}
.coll-item .item-count {
  font-size: 10px;
  color: #888;
  margin-top: 3px;
}
</style>
</head>
<body>

<!-- MENU -->
<div id="menu" class="screen active">
  <h1>✦ COSMOS</h1>
  <div class="sub">Sammle das Universum</div>
  <button class="big-btn primary" onclick="showDraw()">✦ Ziehen</button>
  <button class="big-btn" onclick="showColl()">Sammlung</button>
  <div id="menu-stats">Geladen...</div>
</div>

<!-- DRAW -->
<div id="draw-screen" class="screen">

    <span class="title">Ziehen</span>
    <button onclick="showScreen('menu');updateMenuStats()">↩ Menü</button>
  </div>

      *     *
   *           *
      *     *
         *      </pre>

    <div id="draw-new-badge">NEU ENTDECKT</div>

<!-- COLLECTION -->
<div id="coll-screen" class="screen">

    <button onclick="showScreen('menu');updateMenuStats()">↩ Menü</button>

    </div>
    <div id="coll-filter">

    </div>
    <div id="coll-grid"></div>
  </div>

// Rarities config
var RARITIES = {
  'Häufig':   { label: 'HÄUFIG',   pct: 60 },
  'Selten':   { label: 'SELTEN',   pct: 25 },
  'Episch':   { label: 'EPISCH',   pct: 10 },
  'Legendär': { label: 'LEGENDÄR', pct: 4  },
  'Mythisch': { label: 'MYTHISCH', pct: 1  },
};

// ===================== STATE =====================
var collection = {}; // id -> count
var totalDraws = 0;
var lastDraw = null;
var currentFilter = 'all';

function loadState() {
  try {
    var s = localStorage.getItem('cosmos_v1');
    if(s) {
      var d = JSON.parse(s);
      collection = d.collection || {};
      totalDraws = d.totalDraws || 0;
    }
  } catch(e) {}
}

function saveState() {
  try {
    localStorage.setItem('cosmos_v1', JSON.stringify({ collection: collection, totalDraws: totalDraws }));
  } catch(e) {}
}

// ===================== DRAW LOGIC =====================
function weightedRandom() {
  var total = 0;
  for(var i=0;i<ITEMS.length;i++) total += ITEMS[i].prob;
  var r = Math.random() * total;
  var cum = 0;
  for(var i=0;i<ITEMS.length;i++) {
    cum += ITEMS[i].prob;
    if(r <= cum) return ITEMS[i];
  }
  return ITEMS[ITEMS.length-1];
}

function doDraw() {
  var item = weightedRandom();
  var isNew = !collection[item.id];
  if(!collection[item.id]) collection[item.id] = 0;
  collection[item.id]++;
  totalDraws++;
  lastDraw = item;
  saveState();
  renderDraw(item, isNew);
}

// ===================== RENDER DRAW =====================
function renderDraw(item, isNew) {
  var rar = RARITIES[item.rarity];
  document.getElementById('draw-rarity-label').textContent = rar.label + ' · ' + rar.pct + '% CHANCE';
  document.getElementById('draw-ascii').textContent = item.art;
  document.getElementById('draw-name').textContent = item.name;
  document.getElementById('draw-latin').textContent = item.latin;
  document.getElementById('draw-type-badge').textContent = item.type;
  document.getElementById('draw-desc').textContent = item.desc;

  var newBadge = document.getElementById('draw-new-badge');
  if(isNew) {
    newBadge.style.display = 'inline-block';
  } else {
    newBadge.style.display = 'none';
  }

  // prob bar
  document.getElementById('draw-prob-name').textContent = item.rarity;
  document.getElementById('draw-prob-pct').textContent = rar.pct + '%';
  document.getElementById('draw-prob-fill').style.width = rar.pct + '%';

  // progress
  var owned = Object.keys(collection).length;
  var total = ITEMS.length;
  document.getElementById('draw-progress').textContent = owned + ' / ' + total + ' entdeckt';
  document.getElementById('draw-count-label').textContent = totalDraws + 'x gezogen · ' + collection[item.id] + 'x dieses Item';
}

// ===================== COLLECTION =====================
function filterColl(f, btn) {
  currentFilter = f;
  var btns = document.querySelectorAll('.filter-btn');
  for(var i=0;i<btns.length;i++) btns[i].classList.remove('active');
  btn.classList.add('active');
  renderCollection();
}

function renderCollection() {
  var owned = Object.keys(collection).length;
  var total = ITEMS.length;
  var pct = Math.round(owned/total*100);
  document.getElementById('coll-bar-fill').style.width = pct + '%';
  document.getElementById('coll-progress-text').textContent = owned + ' / ' + total + ' entdeckt · ' + pct + '%';

  var filtered = ITEMS.filter(function(item) {
    if(currentFilter === 'all') return true;
    if(currentFilter === 'owned') return !!collection[item.id];
    return item.type === currentFilter;
  });

  var grid = document.getElementById('coll-grid');
  grid.innerHTML = '';

  for(var i=0;i<filtered.length;i++) {
    var item = filtered[i];
    var isOwned = !!collection[item.id];
    var div = document.createElement('div');
    div.className = 'coll-item' + (isOwned ? ' owned' : ' locked');
    div.innerHTML =
      '<pre>' + (isOwned ? item.art : item.art.replace(/[^\n]/g, '?')) + '</pre>' +
      '<span class="item-name">' + (isOwned ? item.name : '???') + '</span>' +
      '<span class="item-rarity">' + item.rarity + '</span>' +
      (isOwned && collection[item.id] > 1 ? '<div class="item-count">×' + collection[item.id] + '</div>' : '');
    grid.appendChild(div);
  }
}

// ===================== MENU STATS =====================
function updateMenuStats() {
  var owned = Object.keys(collection).length;
  var total = ITEMS.length;
  document.getElementById('menu-stats').textContent =
    owned + ' / ' + total + ' entdeckt · ' + totalDraws + 'x gezogen';
}

// ===================== SCREENS =====================
function showScreen(id) {
  var all = document.querySelectorAll('.screen');
  for(var i=0;i<all.length;i++) all[i].classList.remove('active');
  document.getElementById(id).classList.add('active');
}

function showDraw() {
  showScreen('draw-screen');
  if(lastDraw) {
    renderDraw(lastDraw, false);
  } else {
    // show placeholder
    var owned = Object.keys(collection).length;
    document.getElementById('draw-progress').textContent = owned + ' / ' + ITEMS.length + ' entdeckt';
    document.getElementById('draw-count-label').textContent = totalDraws + 'x gezogen';
    document.getElementById('draw-name').textContent = '— Ziehe dein erstes Item —';
    document.getElementById('draw-rarity-label').textContent = '';
    document.getElementById('draw-latin').textContent = '';
    document.getElementById('draw-desc').textContent = 'Drücke Ziehen um ein zufälliges Himmelsobjekt zu entdecken.';
    document.getElementById('draw-type-badge').textContent = '?';
    document.getElementById('draw-prob-pct').textContent = '';
    document.getElementById('draw-prob-name').textContent = '';
    document.getElementById('draw-prob-fill').style.width = '0%';
  }
}

function showColl() {
  showScreen('coll-screen');
  renderCollection();
}

// ===================== INIT =====================
loadState();
updateMenuStats();
</script>
</body>
</html>
